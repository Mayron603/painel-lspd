<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel LSPD | Administração</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --background: #f1f5f9; 
            --card-bg: #ffffff; 
            --text-primary: #0f172a; 
            --text-secondary: #64748b; 
            --border-color: #e2e8f0; 
            --sidebar-bg: #ffffff; 
            --accent-color: #3b82f6; 
            --accent-hover: #2563eb;
            --accent-text: #ffffff; 
        }
        html.dark { 
            --background: #0f172a; 
            --card-bg: #1e293b; 
            --text-primary: #f8fafc; 
            --text-secondary: #94a3b8; 
            --border-color: #334155; 
            --sidebar-bg: #1e293b; 
            --accent-color: #3b82f6; 
            --accent-hover: #60a5fa;
            --accent-text: #ffffff; 
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--background); 
            color: var(--text-primary); 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        .page-fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-link { position: relative; transition: all 0.2s; }
        .nav-link:hover { background-color: rgba(59, 130, 246, 0.1); color: var(--accent-color); }
        .nav-link.active { background-color: rgba(59, 130, 246, 0.1) !important; color: var(--accent-color) !important; font-weight: 600; }
        .nav-link.active::before { content: ''; position: absolute; left: -1rem; top: 10%; height: 80%; width: 4px; background-color: var(--accent-color); border-radius: 0 4px 4px 0; }
        
        .modal-backdrop { background-color: rgba(15, 23, 42, 0.75); backdrop-filter: blur(8px); }
        
        /* Modern Inputs */
        input, select, textarea { 
            color: var(--text-primary); 
            transition: all 0.2s;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            box-shadow: 0 0 0 2px var(--accent-color);
            border-color: transparent;
        }

        .quick-filter-btn { transition: all 0.2s; }
        .quick-filter-btn.active { background-color: var(--accent-color); color: var(--accent-text); box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3); }
        
        .tab-btn { position: relative; color: var(--text-secondary); transition: all 0.2s; }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active { color: var(--accent-color); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px; background-color: var(--accent-color); border-radius: 2px 2px 0 0; }
        
        .heatmap-cell { transition: transform 0.2s, background-color 0.2s; border-radius: 4px; cursor: pointer; }
        .heatmap-cell:hover { transform: scale(1.2); z-index: 10; border-color: var(--accent-color) !important; }

        /* Modern Gradient Button */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="min-h-screen antialiased selection:bg-blue-500/30">
    <div id="app-root"></div>
    <div id="modal-root"></div>
    <div id="toast-root" class="fixed top-5 right-5 z-[100] space-y-3"></div>

    <script>
        class GcmPanelApp {
            constructor(rootNode) {
                this.root = rootNode;
                this.modalRoot = document.getElementById('modal-root');
                this.toastRoot = document.getElementById('toast-root');
                this.state = {
                    user: null,
                    theme: 'dark',
                    timers: {},
                    charts: {},
                    selectedBatalhao: null,
                    selectedReportUser: null,
                    activeReportFilter: null,
                    rankingFilters: {
                        period: 'weekly',
                        year: new Date().getFullYear(),
                        month: new Date().getMonth(),
                        week: this.getWeekNumber(new Date())
                    },
                    spreadsheetFilters: {
                        status: '',
                        username: ''
                    }
                };

                this.defineApi();
                this.defineTemplates();
                this.init();
            }

            async init() {
                this.state.theme = localStorage.getItem('theme') || 'dark';
                this.updateThemeClass();
                this.state.user = { name: 'Comando LSPD', email: 'admin@lspd.gov' };
                try {
                    await this.renderAppShell();
                    this.checkForAlerts();
                    this.state.timers.alerts = setInterval(() => this.checkForAlerts(), 5 * 60 * 1000);
                } catch (error) {
                    console.error("Erro na inicialização:", error);
                    this.root.innerHTML = `<div class="flex items-center justify-center h-screen"><div class="bg-red-500/10 text-red-500 p-6 rounded-2xl border border-red-500/20 shadow-xl flex flex-col items-center"><i class="fas fa-server text-4xl mb-3"></i><h2 class="text-lg font-bold">Falha de Conexão</h2><p>Não foi possível iniciar a aplicação. Verifique a API.</p></div></div>`;
                }
            }

            async checkForAlerts() {
                const alertContainer = document.getElementById('alert-container');
                if (!alertContainer) return;

                const res = await this.api.getAlerts();
                if(res.success && res.alerts.length > 0) {
                    alertContainer.innerHTML = this.templates.alertBanner(res.alerts);
                    alertContainer.querySelector('.close-alert-btn')?.addEventListener('click', () => alertContainer.innerHTML = '');
                } else {
                    alertContainer.innerHTML = '';
                }
            }

            async renderAppShell() {
                this.clearTimers();
                this.root.innerHTML = this.templates.appShell(this.state.user);
                this.setupCommonListeners();
                await this.navigateTo(window.location.hash.substring(1) || 'dashboard');
            }

            async navigateTo(page) {
                this.clearTimers();
                if (page !== 'reports') {
                    this.state.selectedReportUser = null;
                    this.state.selectedBatalhao = null;
                }
                const contentContainer = this.root.querySelector('#page-content');
                if (!contentContainer) return;

                window.location.hash = page;
                
                // Update header title based on page
                const titles = {
                    dashboard: 'Visão Geral', ranking: 'Ranking Oficial', reports: 'Central de Relatórios',
                    spreadsheet: 'Acompanhamento ao Vivo', members: 'Gestão de Efetivo', settings: 'Ajustes do Sistema'
                };
                this.root.querySelector('#page-title').textContent = titles[page] || 'Página';
                
                this.root.querySelectorAll('#main-nav a').forEach(a => a.classList.toggle('active', a.hash === `#${page}`));

                const pageRenderers = {
                    dashboard: this.renderDashboardPage,
                    ranking: this.renderRankingPage,
                    reports: this.renderReportsPage,
                    spreadsheet: this.renderSpreadsheetPage,
                    members: this.renderMembersPage,
                    settings: this.renderSettingsPage,
                };
                const renderer = pageRenderers[page] || this.renderNotFoundPage;

                await renderer.call(this, contentContainer);
            }

            async renderDashboardPage(container) {
                container.innerHTML = this.templates.loadingDashboard();
                const summary = await this.api.getDashboardSummary();
                if (summary && summary.success) {
                    container.innerHTML = this.templates.dashboardPage(summary, this.formatDuration);
                    this.renderChart('status', summary, '#status-chart');
                    this.renderChart('activity', summary.weeklyActivity, '#activity-chart');
                    this.renderChart('hourly', summary.hourlyActivity, '#hourly-activity-chart');
                    this.renderActivityFeed(summary.activityFeed);
                } else {
                    container.innerHTML = this.templates.errorPage('Falha ao carregar dados do dashboard.');
                }
            }

            formatDuration(ms, detailed = false) {
                 if (isNaN(ms) || ms <= 0) return detailed ? '0h 0m' : '0m';
                const hours = Math.floor(ms / 3600000);
                const minutes = Math.floor((ms % 3600000) / 60000);
                let result = '';
                if (hours > 0) result += `${hours}h `;
                if (minutes > 0 || detailed) result += `${minutes}m`;
                return result.trim() || '0m';
            }

            getPeriodDescription(activeFilter, startDate, endDate) {
                const formatDate = (dateString) => {
                    if (!dateString) return '';
                    const [year, month, day] = dateString.split('-');
                    return `${day}/${month}/${year}`;
                };

                switch(activeFilter) {
                    case 'today': return 'de Hoje';
                    case 'week': return 'desta Semana';
                    case 'month': return 'deste Mês';
                    default:
                        if (startDate && endDate) {
                            if (startDate === endDate) return `do dia ${formatDate(startDate)}`;
                            return `de ${formatDate(startDate)} a ${formatDate(endDate)}`;
                        }
                        if (startDate) return `a partir de ${formatDate(startDate)}`;
                        if (endDate) return `até ${formatDate(endDate)}`;
                        return 'de todo o período';
                }
            }

            renderActivityFeed(feedItems) {
                const feedContainer = this.root.querySelector('#activity-feed');
                if (!feedContainer || !feedItems) return;
                feedContainer.innerHTML = feedItems.length > 0
                    ? feedItems.map(item => this.templates.activityFeedItem(item)).join('')
                    : '<div class="flex flex-col items-center justify-center py-8 text-text-secondary"><i class="fas fa-bed text-3xl mb-3 opacity-50"></i><p>Nenhuma atividade recente no sistema.</p></div>';
            }

            async renderRankingPage(container) {
                container.innerHTML = this.templates.rankingPage(this.state.rankingFilters, this.getWeekNumber, this.getWeekDateRange);
                this.updateRankingView();
                this.setupRankingListeners();
            }

            async updateRankingView() {
                const listContainer = this.root.querySelector('#ranking-list-container');
                if (!listContainer) return;
                listContainer.innerHTML = this.templates.loadingRow(3);

                const params = new URLSearchParams(this.state.rankingFilters);
                const res = await this.api.getRanking(params.toString());

                if (res.success) {
                    listContainer.innerHTML = res.ranking.length > 0
                        ? res.ranking.map((item, index) => this.templates.rankingItem(item, index, this.formatDuration)).join('')
                        : this.templates.emptyRow(3);
                } else {
                    listContainer.innerHTML = this.templates.errorPage('Falha ao carregar ranking.');
                }
            }

            setupRankingListeners() {
                const periodSelect = this.root.querySelector('#ranking-period-select');
                const yearSelect = this.root.querySelector('#ranking-year-select');
                const monthSelect = this.root.querySelector('#ranking-month-select');
                const weekSelect = this.root.querySelector('#ranking-week-select');

                const handleFilterChange = () => {
                    this.state.rankingFilters.period = periodSelect.value;
                    this.state.rankingFilters.year = parseInt(yearSelect.value);
                    if (periodSelect.value === 'monthly') {
                        this.state.rankingFilters.month = parseInt(monthSelect.value);
                    } else {
                        this.state.rankingFilters.week = parseInt(weekSelect.value);
                    }
                    this.renderRankingPage(this.root.querySelector('#page-content'));
                };

                periodSelect.addEventListener('change', handleFilterChange);
                yearSelect.addEventListener('change', handleFilterChange);
                monthSelect.addEventListener('change', handleFilterChange);
                weekSelect.addEventListener('change', handleFilterChange);
            }

            async renderReportsPage(container) {
                container.innerHTML = this.templates.loadingDashboard();

                if (this.state.selectedReportUser) {
                    await this.renderReportForUser(container, this.state.selectedReportUser);
                } else if (this.state.selectedBatalhao) {
                    const usersResponse = await this.api.getUniqueUsers(this.state.selectedBatalhao.id);
                    if (usersResponse.success) {
                        container.innerHTML = this.templates.reportUserListPage(usersResponse.users, this.state.selectedBatalhao);
                        container.querySelector('#back-to-batalhoes-btn').addEventListener('click', (e) => {
                            e.preventDefault();
                            this.state.selectedBatalhao = null;
                            this.renderReportsPage(container);
                        });
                        container.querySelectorAll('.user-report-link').forEach(link => {
                            link.addEventListener('click', (e) => {
                                e.preventDefault();
                                const userId = e.currentTarget.dataset.userid;
                                const username = e.currentTarget.dataset.username;
                                this.state.selectedReportUser = { userId, username };
                                this.renderReportsPage(container);
                            });
                        });
                    } else {
                        container.innerHTML = this.templates.errorPage('Falha ao carregar lista de usuários.');
                    }
                } else {
                    const batalhoesResponse = await this.api.getBatalhoes();
                    if (batalhoesResponse.success) {
                        container.innerHTML = this.templates.reportBatalhaoListPage(batalhoesResponse.batalhoes);
                        container.querySelectorAll('.batalhao-report-link').forEach(link => {
                            link.addEventListener('click', (e) => {
                                e.preventDefault();
                                this.state.selectedBatalhao = JSON.parse(e.currentTarget.dataset.batalhao);
                                this.renderReportsPage(container);
                            });
                        });
                    } else {
                        container.innerHTML = this.templates.errorPage('Falha ao carregar lista de batalhões.');
                    }
                }
            }

            async renderReportForUser(container, user) {
                container.innerHTML = this.templates.reportsPage(user, this.state.activeReportFilter, this.state.selectedBatalhao.name);
                this.setupReportListeners();
                await this.renderReportTable(false);
            }

            setupReportListeners() {
                this.root.querySelector('#filter-btn').addEventListener('click', () => {
                    this.state.activeReportFilter = null;
                    this.updateQuickFilterButtons();
                    this.renderReportTable(false);
                });
                this.root.querySelector('#export-xlsx-btn').addEventListener('click', () => this.exportReport('xlsx'));
                this.root.querySelector('#export-pdf-btn').addEventListener('click', () => this.exportReport('pdf'));
                this.root.querySelector('#back-to-users-btn').addEventListener('click', () => {
                    this.state.selectedReportUser = null;
                    this.renderReportsPage(this.root.querySelector('#page-content'));
                });

                const todayBtn = this.root.querySelector('#qf-today');
                const weekBtn = this.root.querySelector('#qf-week');
                const monthBtn = this.root.querySelector('#qf-month');
                const startDateInput = this.root.querySelector('#start-date-filter');
                const endDateInput = this.root.querySelector('#end-date-filter');

                const toLocalISOString = (date) => {
                    const year = date.getFullYear();
                    const month = (date.getMonth() + 1).toString().padStart(2, '0');
                    const day = date.getDate().toString().padStart(2, '0');
                    return `${year}-${month}-${day}`;
                };

                todayBtn.addEventListener('click', () => {
                    const today = toLocalISOString(new Date());
                    startDateInput.value = today;
                    endDateInput.value = today;
                    this.state.activeReportFilter = 'today';
                    this.updateQuickFilterButtons();
                    this.renderReportTable(false);
                });

                weekBtn.addEventListener('click', () => {
                    const today = new Date();
                    const dayOfWeek = today.getDay();
                    const diffToMonday = today.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
                    const monday = new Date(today.setDate(diffToMonday));

                    const sunday = new Date(monday);
                    sunday.setDate(monday.getDate() + 6);

                    startDateInput.value = toLocalISOString(monday);
                    endDateInput.value = toLocalISOString(sunday);
                    this.state.activeReportFilter = 'week';
                    this.updateQuickFilterButtons();
                    this.renderReportTable(false);
                });

                monthBtn.addEventListener('click', () => {
                    const today = new Date();
                    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
                    const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);

                    startDateInput.value = toLocalISOString(firstDay);
                    endDateInput.value = toLocalISOString(lastDay);
                    this.state.activeReportFilter = 'month';
                    this.updateQuickFilterButtons();
                    this.renderReportTable(false);
                });

                startDateInput.addEventListener('change', () => {
                    this.state.activeReportFilter = null;
                    this.updateQuickFilterButtons();
                });
                endDateInput.addEventListener('change', () => {
                    this.state.activeReportFilter = null;
                    this.updateQuickFilterButtons();
                });
            }

            updateQuickFilterButtons() {
                this.root.querySelectorAll('.quick-filter-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.filter === this.state.activeReportFilter);
                });
            }

            async renderMembersPage(container) {
                container.innerHTML = this.templates.loadingDashboard();
                const response = await this.api.getMembers();

                if (response && response.success) {
                    container.innerHTML = this.templates.membersPage(response.members);
                    const searchInput = this.root.querySelector('#member-search-input');
                    const tableBody = this.root.querySelector('#members-table-body');

                    const renderTable = (members) => {
                        tableBody.innerHTML = members && members.length > 0 
                            ? members.map(m => this.templates.memberRow(m)).join('')
                            : this.templates.emptyRow(3);
                        
                        tableBody.querySelectorAll('.view-member-details-btn').forEach(btn => {
                            btn.addEventListener('click', e => {
                                const userId = e.currentTarget.dataset.userid;
                                this.renderMemberDetailsModal(userId);
                            });
                        });
                    };

                    renderTable(response.members);

                    if (searchInput) {
                        searchInput.addEventListener('input', (e) => {
                            const searchTerm = e.target.value.toLowerCase();
                            const filteredMembers = response.members.filter(member => {
                                return member.username.toLowerCase().includes(searchTerm);
                            });
                            renderTable(filteredMembers);
                        });
                    }
                } else {
                    container.innerHTML = this.templates.errorPage('Falha ao carregar lista de membros.');
                }
            }

            exportReport(format) {
                const filters = {
                    userId: this.state.selectedReportUser.userId,
                    status: this.root.querySelector('#status-filter-select').value,
                    startDate: this.root.querySelector('#start-date-filter').value,
                    endDate: this.root.querySelector('#end-date-filter').value,
                };
                const params = new URLSearchParams(Object.fromEntries(Object.entries(filters).filter(([_, v]) => v != null && v !== '')));
                params.append('format', format);
                window.open(`/api/registros/export?${params.toString()}`, '_blank');
            }

            async renderReportTable(isSpreadsheet = false) {
                const tableId = isSpreadsheet ? '#spreadsheet-table-body' : '#reports-table-body';
                const tableBody = this.root.querySelector(tableId);
                if (!tableBody) return;

                const colspan = isSpreadsheet ? 6 : 5;
                tableBody.innerHTML = this.templates.loadingRow(colspan);

                let filters = {};
                if (isSpreadsheet) {
                    filters = {};
                } else {
                    filters = {
                        userId: this.state.selectedReportUser?.userId,
                        status: this.root.querySelector('#status-filter-select')?.value,
                        startDate: this.root.querySelector('#start-date-filter')?.value,
                        endDate: this.root.querySelector('#end-date-filter')?.value,
                    };
                    if (!filters.userId) {
                        tableBody.innerHTML = this.templates.emptyRow(colspan);
                        return;
                    }
                }

                const data = await this.api.getRegistros(filters);

                if (data && data.success) {
                    let allPontos = data.registros.flatMap(reg => reg.pontos.map(p => ({...p, username: reg.username, userId: reg.userId })));

                    allPontos.sort((a,b) => new Date(b.entrada) - new Date(a.entrada));

                    if (isSpreadsheet) {
                        const { status, username } = this.state.spreadsheetFilters;
                        if (status) {
                            allPontos = allPontos.filter(p => {
                                const isCompleted = !!p.saida;
                                if (status === 'completed') return isCompleted;
                                if (status === 'pending') return !isCompleted;
                                return true;
                            });
                        }
                        if (username) {
                            allPontos = allPontos.filter(p => p.username.toLowerCase().includes(username.toLowerCase()));
                        }
                        allPontos = allPontos.slice(0, 100);
                    }

                    const rowTemplate = isSpreadsheet ? this.templates.spreadsheetRow : this.templates.reportRow;
                    tableBody.innerHTML = allPontos.length > 0 ? allPontos.map(p => rowTemplate(p, this.formatDuration)).join('') : this.templates.emptyRow(colspan);
                    this.setupActionListeners(tableBody);

                    if (!isSpreadsheet) {
                        const totalHoursEl = this.root.querySelector('#report-total-hours');
                        if (totalHoursEl) {
                            const periodDescription = this.getPeriodDescription(this.state.activeReportFilter, filters.startDate, filters.endDate);
                            totalHoursEl.innerHTML = `<i class="fas fa-history mr-1"></i> Tempo Total ${periodDescription}: <span class="text-blue-500 font-bold ml-1">${this.formatDuration(data.totalDuration)}</span>`;
                            totalHoursEl.style.display = data.registros.length > 0 ? 'flex' : 'none';
                        }
                    }
                } else {
                    tableBody.innerHTML = this.templates.emptyRow(colspan);
                }
            }

            async renderSpreadsheetPage(container) {
                container.innerHTML = this.templates.spreadsheetPage(this.state.spreadsheetFilters);
                this.setupSpreadsheetListeners();
                const renderTable = () => this.renderReportTable(true);
                this.state.timers.spreadsheet = setInterval(renderTable, 30000);
                await renderTable();
            }

            setupSpreadsheetListeners() {
                const statusFilter = this.root.querySelector('#spreadsheet-status-filter');
                const userFilter = this.root.querySelector('#spreadsheet-user-filter');

                const applyFilters = () => {
                    this.state.spreadsheetFilters.status = statusFilter.value;
                    this.state.spreadsheetFilters.username = userFilter.value;
                    this.renderReportTable(true);
                };

                statusFilter.addEventListener('change', applyFilters);
                userFilter.addEventListener('input', applyFilters);
            }

            renderSettingsPage(container) {
                container.innerHTML = this.templates.settingsPage();
            }

            renderNotFoundPage(container) {
                container.innerHTML = this.templates.notFoundPage();
            }

            setupCommonListeners() {
                this.root.querySelector('#theme-toggle')?.addEventListener('click', () => this.toggleTheme());
                window.onhashchange = () => this.navigateTo(window.location.hash.substring(1) || 'dashboard');
                this.updateThemeUI();
            }

            setupActionListeners(container) {
                container.querySelectorAll('.force-logout-btn').forEach(btn => btn.addEventListener('click', e => {
                    const username = e.currentTarget.dataset.username;
                    this.renderForceLogoutInfoModal(username);
                }));
                container.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', e => {
                    const ponto = JSON.parse(e.currentTarget.dataset.ponto);
                    this.renderEditModal(ponto);
                }));
                container.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', e => {
                    this.renderDeleteModal(e.currentTarget.dataset.id);
                }));
            }

            toggleTheme() {
                this.state.theme = this.state.theme === 'light' ? 'dark' : 'light';
                localStorage.setItem('theme', this.state.theme);
                this.updateThemeUI();
            }

            updateThemeClass() { document.documentElement.className = this.state.theme; }
            updateThemeUI() {
                this.updateThemeClass();
                const themeIcon = this.root.querySelector('#theme-toggle');
                if(themeIcon) themeIcon.innerHTML = `<i class="fas fa-${this.state.theme === 'light' ? 'moon' : 'sun'} text-xl"></i>`;
            }

            clearTimers() {
                Object.values(this.state.timers).forEach(timer => clearInterval(timer));
                this.state.timers = {};
            }

            getWeekNumber(d) {
                d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
                d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
                var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
                var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
                return weekNo;
            }

            getWeekDateRange(year, week) {
                const d = new Date(year, 0, 1 + (week - 1) * 7);
                const day = d.getDay();
                const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(d.setDate(diff));
                const sunday = new Date(monday);
                sunday.setDate(monday.getDate() + 6);
                const formatDate = (date) => date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
                return `${formatDate(monday)} - ${formatDate(sunday)}`;
            }

            renderChart(type, data, selector) {
                const ctx = this.root.querySelector(selector)?.getContext('2d');

                const chartId = selector.substring(1);
                if (this.state.charts[chartId]) this.state.charts[chartId].destroy();

                const chartColors = { 
                    text: this.state.theme === 'dark' ? '#94a3b8' : '#64748b', 
                    grid: this.state.theme === 'dark' ? '#334155' : '#e2e8f0', 
                    cardBg: this.state.theme === 'dark' ? '#1e293b' : '#ffffff' 
                };

                let chartConfig;

                if (type === 'status') {
                    // This chart is not used in the new dashboard layout, keeping logic just in case
                    chartConfig = { type: 'doughnut', data: { labels: ['Fechados Hoje', 'Pendentes'], datasets: [{ data: [data.closedToday, data.pendingRegisters], backgroundColor: ['#22c55e', '#f59e0b'], borderColor: chartColors.cardBg, borderWidth: 5 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: chartColors.text } } } } };
                } else if (type === 'activity') {
                    const labels = [...Array(7)].map((_, i) => new Date(new Date().setDate(new Date().getDate() - i)).toISOString().slice(0, 10)).reverse();
                    chartConfig = { 
                        type: 'line', 
                        data: { 
                            labels: labels.map(l => new Date(l).toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'})), 
                            datasets: [{ 
                                label: 'Registros', 
                                data: labels.map(l => data[l] || 0), 
                                backgroundColor: (context) => {
                                    const ctx = context.chart.ctx;
                                    const gradient = ctx.createLinearGradient(0, 0, 0, 300);
                                    gradient.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
                                    gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');
                                    return gradient;
                                }, 
                                borderColor: '#3b82f6', 
                                borderWidth: 3, 
                                fill: true, 
                                tension: 0.4,
                                pointBackgroundColor: '#ffffff',
                                pointBorderColor: '#3b82f6',
                                pointBorderWidth: 2,
                                pointRadius: 4,
                                pointHoverRadius: 6
                            }] 
                        }, 
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            scales: { 
                                y: { beginAtZero: true, border: {display: false}, ticks: { color: chartColors.text, padding: 10 }, grid: { color: chartColors.grid, drawBorder: false } }, 
                                x: { border: {display: false}, ticks: { color: chartColors.text, padding: 10 }, grid: { display: false, drawBorder: false } } 
                            }, 
                            plugins: { 
                                legend: { display: false },
                                tooltip: { backgroundColor: chartColors.cardBg, titleColor: this.state.theme === 'dark' ? '#fff' : '#000', bodyColor: chartColors.text, borderColor: chartColors.grid, borderWidth: 1, padding: 12, displayColors: false, cornerRadius: 8 }
                            } 
                        } 
                    };
                } else if (type === 'hourly') {
                    chartConfig = { type: 'bar', data: { labels: Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`), datasets: [{ label: 'Registros por Hora', data: data, backgroundColor: 'rgba(59, 130, 246, 0.8)', hoverBackgroundColor: '#2563eb', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, border: {display: false}, ticks: { color: chartColors.text, stepSize: 1, padding: 10 }, grid: { color: chartColors.grid, drawBorder: false } }, x: { border: {display: false}, ticks: { color: chartColors.text, maxTicksLimit: 12 }, grid: { display: false } } }, plugins: { legend: { display: false }, tooltip: { backgroundColor: chartColors.cardBg, titleColor: this.state.theme === 'dark' ? '#fff' : '#000', bodyColor: chartColors.text, borderColor: chartColors.grid, borderWidth: 1, padding: 12, displayColors: false, cornerRadius: 8 } } } };
                } else if (type === 'monthlyComparison') {
                    chartConfig = { type: 'bar', data: { labels: ['Horas no Mês'], datasets: [{ label: 'Horas do Membro', data: [data.totalHoursThisMonth.toFixed(2)], backgroundColor: '#3b82f6', borderRadius: 6 }, { label: 'Média da Equipe', data: [data.teamAverageHoursThisMonth.toFixed(2)], backgroundColor: this.state.theme === 'dark' ? '#475569' : '#cbd5e1', borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', scales: { x: { beginAtZero: true, border: {display: false}, ticks: { color: chartColors.text, callback: value => `${value}h` }, grid: { color: chartColors.grid } }, y: { border: {display: false}, ticks: { color: chartColors.text }, grid: { display: false } } }, plugins: { legend: { position: 'bottom', labels: { color: chartColors.text, padding: 20, usePointStyle: true, pointStyle: 'circle' } } } } };
                }

            showToast(message, type = 'info') {

                const toast = document.createElement('div');
                toast.className = `flex items-center w-full max-w-sm p-4 text-white ${colors[type]} rounded-xl shadow-2xl page-fade-in`;
                toast.innerHTML = `<div class="text-2xl"><i class="fas ${icons[type]}"></i></div><div class="ml-4 flex-1 text-sm font-medium tracking-wide">${message}</div>`;
                this.toastRoot.appendChild(toast);
                setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)'; toast.style.transition = 'all 0.4s ease'; setTimeout(() => toast.remove(), 400); }, 4000);
            }

            isColorDark(hexColor) {
                if (!hexColor || hexColor.length < 4) return false;
                let color = (hexColor.charAt(0) === '#') ? hexColor.substring(1, 7) : hexColor;
                if (color.length === 3) {
                    color = color[0] + color[0] + color[1] + color[1] + color[2] + color[2];
                }
                const r = parseInt(color.substring(0, 2), 16);
                const g = parseInt(color.substring(2, 4), 16);
                const b = parseInt(color.substring(4, 6), 16);
                const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                return luminance < 0.5;
            }

                        const medals = ['text-yellow-400 drop-shadow-md text-2xl', 'text-slate-400 drop-shadow-sm text-xl', 'text-amber-600 drop-shadow-sm text-lg'];
                        const icon = index < 3 ? `<i class="fas fa-medal ${medals[index]}"></i>` : `<span class="font-bold text-text-secondary w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center mx-auto">${index + 1}</span>`;
                        const rowClass = index < 3 ? 'bg-gradient-to-r from-transparent via-slate-50/50 to-transparent dark:via-slate-800/20' : 'hover:bg-slate-50/50 dark:hover:bg-slate-800/40';
                        return `
                        <tr class="${rowClass} transition-colors">
                            <td class="p-4 text-center align-middle">${icon}</td>
                            <td class="p-4 px-6 font-bold text-base text-text-primary">${item.username}</td>
                            <td class="p-4 px-6 text-right font-black tracking-tight text-blue-500 text-base">${formatDuration(item.totalDuration)}</td>
                        </tr>`;
                    },
                    
                    membersPage: (members) => `
                        <div class="card rounded-2xl shadow-sm border border-border-color overflow-hidden" style="background-color: var(--card-bg);">
                            <div class="p-6 md:p-8 border-b border-inherit bg-slate-50/50 dark:bg-slate-800/20 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                <div>
                                    <h3 class="text-2xl font-bold tracking-tight">Efetivo Registrado</h3>
                                    <p class="text-sm text-text-secondary mt-1">Gestão de perfis e hierarquia via Discord.</p>
                                </div>
                                <div class="relative w-full md:w-72">
                                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-text-secondary"></i>
                                    <input type="text" id="member-search-input" placeholder="Localizar oficial..." class="w-full pl-11 pr-4 py-2.5 bg-card-bg border border-border-color rounded-xl text-sm font-medium focus:ring-2 focus:ring-blue-500">
                                </div>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="min-w-full text-sm">
                                    <thead class="bg-slate-50/80 dark:bg-slate-800/40 border-b border-border-color">
                                        <tr>
                                            <th class="px-6 py-4 text-left font-bold text-text-secondary uppercase tracking-wider text-xs">Identificação</th>
                                            <th class="px-6 py-4 text-left font-bold text-text-secondary uppercase tracking-wider text-xs">Patentes / Cargos</th>
                                            <th class="px-6 py-4 text-right font-bold text-text-secondary uppercase tracking-wider text-xs">Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody id="members-table-body" class="divide-y divide-border-color bg-card-bg">
                                        ${members && members.length > 0 ? members.map(m => this.templates.memberRow(m)).join('') : this.templates.emptyRow(3)}
                                    </tbody>
                                </table>
                            </div>
                        </div>`,

                    memberRow: (member) => `
                        <tr class="hover:bg-slate-50/80 dark:hover:bg-slate-800/40 transition-colors">
                            <td class="p-4 px-6">
                                <div class="flex items-center gap-4">
                                    <img src="${member.avatarUrl || 'https://cdn.discordapp.com/embed/avatars/0.png'}" alt="Avatar" class="w-12 h-12 rounded-xl object-cover shadow-sm border border-border-color">
                                    <div>
                                        <div class="font-bold text-base">${member.username}</div>
                                        <div class="text-xs font-medium text-text-secondary flex items-center gap-1 mt-0.5"><i class="fab fa-discord"></i> ID: ${member.discordUserId}</div>
                                    </div>
                                </div>
                            </td>
                            <td class="p-4 px-6">
                                <div class="flex flex-wrap gap-2">
                                    ${member.roles.length > 0 ? member.roles.map(role => `<span class="px-2.5 py-1 text-xs font-bold rounded-lg border flex items-center gap-1.5" style="background-color: ${role.color || '#94a3b8'}20; color: ${role.color || '#cbd5e1'}; border-color: ${role.color || '#94a3b8'}40;"><span class="w-1.5 h-1.5 rounded-full" style="background-color: ${role.color || '#cbd5e1'};"></span>${role.name}</span>`).join('') : '<span class="text-xs text-text-secondary italic bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-lg">Sem patentes</span>'}
                                </div>
                            </td>
                            <td class="p-4 px-6 text-right">
                                <button class="view-member-details-btn bg-slate-100 dark:bg-slate-800 text-text-secondary hover:text-blue-500 hover:bg-blue-500/10 w-10 h-10 rounded-xl transition-colors inline-flex items-center justify-center" data-userid="${member.discordUserId}" title="Perfil Completo">
                                    <i class="fas fa-external-link-alt"></i>
                                </button>
                            </td>
                        </tr>`,

                    memberDetailsModal: (member) => `
                        <div class="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
                            <div class="modal-content card rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col border border-border-color page-fade-in" style="background-color: var(--card-bg);">
                                <div class="p-8 border-b border-inherit bg-slate-50/50 dark:bg-slate-800/20 flex items-center justify-between flex-shrink-0 rounded-t-2xl relative overflow-hidden">
                                    <div class="absolute inset-0 bg-gradient-to-r from-blue-500/10 to-transparent pointer-events-none"></div>
                                    <div class="flex items-center gap-5 relative z-10 min-w-0">
                                        <img src="${member.avatarUrl || 'https://cdn.discordapp.com/embed/avatars/0.png'}" alt="Avatar" class="w-16 h-16 rounded-2xl object-cover shadow-md border-2 border-card-bg">
                                        <div class="min-w-0">
                                            <h3 class="text-2xl font-bold tracking-tight truncate">${member.username}</h3>
                                            <p class="text-sm font-medium text-text-secondary mt-1"><i class="fab fa-discord mr-1"></i>${member.discordUserId}</p>
                                        </div>
                                    </div>
                                    <button class="modal-close-btn bg-card-bg border border-border-color text-text-secondary hover:text-rose-500 w-10 h-10 rounded-xl hover:shadow-md transition-all flex-shrink-0 flex items-center justify-center relative z-10"><i class="fas fa-times"></i></button>
                                </div>
                                <div class="border-b border-inherit flex-shrink-0 bg-card-bg">
                                    <div class="px-8 flex items-center gap-8">
                                        <button id="obs-tab-btn" class="tab-btn font-bold py-4 border-b-2 border-transparent text-sm tracking-wide uppercase">Ficha & Anotações</button>
                                        <button id="stats-tab-btn" class="tab-btn font-bold py-4 border-b-2 border-transparent text-sm tracking-wide uppercase">Performance</button>
                                    </div>
                                </div>
                                <div class="flex-grow overflow-y-auto p-8 custom-scrollbar">
                                    <div id="obs-content" class="tab-content" style="display: none;">
                                        <div class="bg-slate-50 dark:bg-slate-800/30 border border-border-color rounded-xl p-5 mb-8">
                                            <form id="add-observation-form">
                                                <label class="block text-xs font-bold text-text-secondary uppercase tracking-wider mb-2">Inserir nova anotação no dossiê</label>
                                                <textarea name="observationText" class="w-full p-3 bg-card-bg border border-border-color focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg text-sm transition-all" rows="2" placeholder="Descreva o comportamento, punição ou elogio..." required></textarea>
                                                <div class="flex justify-end mt-3"><button type="submit" class="btn-primary px-5 py-2 rounded-lg font-bold text-sm">Registrar</button></div>
                                            </form>
                                        </div>
                                        <h4 class="font-bold text-lg mb-4 flex items-center gap-2"><i class="fas fa-clipboard-list text-blue-500"></i> Histórico do Oficial</h4>
                                        <div id="observations-list" class="space-y-4">
                                            ${member.observations && member.observations.length > 0 ? member.observations.map(obs => `
                                            <div class="p-4 rounded-xl border border-border-color bg-card-bg shadow-sm">
                                                <p class="text-sm leading-relaxed">${obs.text}</p>
                                                <div class="flex justify-between items-center mt-3 pt-3 border-t border-border-color">
                                                    <span class="text-xs font-bold text-text-primary bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded"><i class="fas fa-pen-nib mr-1"></i> ${obs.author}</span>
                                                    <span class="text-xs font-medium text-text-secondary"><i class="far fa-calendar-alt mr-1"></i> ${new Date(obs.date).toLocaleString('pt-BR')}</span>
                                                </div>
                                            </div>`).join('') : '<div class="text-center py-8 bg-slate-50 dark:bg-slate-800/20 rounded-xl border border-dashed border-border-color"><p class="text-sm text-text-secondary font-medium">Ficha limpa. Nenhuma anotação registrada.</p></div>'}
                                        </div>
                                    </div>
                                    <div id="stats-content" class="tab-content" style="display: none;"></div>
                                </div>
                            </div>
                        </div>`,
                        
                    memberStatsContent: (stats, formatDuration) => `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div class="rounded-xl border border-border-color p-5 flex items-center gap-4 bg-slate-50 dark:bg-slate-800/30">
                                <div class="w-12 h-12 rounded-full bg-blue-500/10 text-blue-500 flex items-center justify-center text-xl"><i class="fas fa-stopwatch"></i></div>
                                <div><p class="text-xs font-bold text-text-secondary uppercase tracking-wider">Média por Turno</p><p class="text-xl font-bold mt-0.5">${formatDuration(stats.averageDuration, true)}</p></div>
                            </div>
                            <div class="rounded-xl border border-border-color p-5 flex items-center gap-4 bg-slate-50 dark:bg-slate-800/30">
                                <div class="w-12 h-12 rounded-full bg-indigo-500/10 text-indigo-500 flex items-center justify-center text-xl"><i class="fas fa-calendar-check"></i></div>
                                <div><p class="text-xs font-bold text-text-secondary uppercase tracking-wider">Horas neste Mês</p><p class="text-xl font-bold mt-0.5">${stats.totalHoursThisMonth.toFixed(1)}h</p></div>
                            </div>
                        </div>
                        <div class="rounded-xl border border-border-color p-6 mb-8 bg-card-bg shadow-sm">
                            <h4 class="font-bold mb-6 text-base">Desempenho vs. Equipe (Mês Atual)</h4>
                            <div class="h-40"><canvas id="monthly-comparison-chart"></canvas></div>
                        </div>
                        <div class="rounded-xl border border-border-color p-6 bg-card-bg shadow-sm">
                            <h4 class="font-bold mb-4 text-base">Mapa de Frequência (90 dias)</h4>
                            <div class="overflow-x-auto">
                                <table class="w-full border-separate border-spacing-1 text-xs text-center">
                                    <thead><tr><th class="w-10"></th>${Array.from({length: 12}, (_, i) => `<th colspan="2" class="pb-2 font-semibold text-text-secondary">${i*2}h</th>`).join('')}</tr></thead>
                                    <tbody>
                                    ${['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'].map((day, dayIndex) => `
                                        <tr><td class="font-bold pr-3 text-right text-text-secondary">${day}</td>
                                        ${stats.activityHeatmap[dayIndex].map(count => {
                                            const max = Math.max(...stats.activityHeatmap.flat());
                                            const opacity = max > 0 ? (count / max) : 0;
                                            return `<td class="heatmap-cell h-5 w-5 rounded" style="background-color: ${opacity > 0 ? `rgba(59, 130, 246, ${Math.max(0.15, opacity)})` : 'var(--border-color)'}; opacity: ${opacity > 0 ? 1 : 0.3};" title="${count} patrulha(s)"></td>`;
                                        }).join('')}
                                        </tr>`).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>`,
                };
            }
        }
        new GcmPanelApp(document.getElementById('app-root'));
    </script>
</body>
</html>
